services:
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: host.docker.internal
      PMA_PORT: 3306
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - phpmyadmin_network

networks:
  phpmyadmin_network:
    driver: bridge


